<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FamBite – Food Delivery in Ambala, Haryana</title>
<meta name="description" content="FamBite – Fast food delivery from Bara Village, Ambala, Haryana. Order from the best local restaurants in Bara, Dhurali, Ugara, Shivalamandi, Therva.">
<meta name="keywords" content="food delivery, Bara village, Ambala, Haryana, FamBite, online food order">
<meta name="author" content="FamBite">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#e23744;--red2:#c0392b;--orange:#ff6b35;
  --bg:#f2f2f7;--white:#fff;--card:#fff;
  --text:#1c1c1e;--muted:#6e6e73;--border:#e5e5ea;
  --green:#2ecc71;--yellow:#f39c12;--blue:#0575e6;
  --shadow:0 2px 16px rgba(0,0,0,0.10);
  --radius:16px;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button{cursor:pointer;font-family:'Nunito',sans-serif}
input,select,textarea{font-family:'Nunito',sans-serif}
a{text-decoration:none;color:inherit}

.screen{display:none;min-height:100vh}
.screen.active{display:block}

#loadingOverlay{
  position:fixed;inset:0;background:linear-gradient(160deg,#1a0608,#e23744);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .5s;
}
#loadingOverlay.hide{opacity:0;pointer-events:none}
.loading-logo{font-size:56px;margin-bottom:8px;animation:spin 1s ease-in-out}
.loading-brand{font-family:'Poppins',sans-serif;font-size:36px;font-weight:800;color:#fff}
.loading-brand span{color:#ffe066}
.loading-bar{width:180px;height:4px;background:rgba(255,255,255,0.2);border-radius:4px;margin-top:28px;overflow:hidden}
.loading-progress{height:100%;background:#fff;border-radius:4px;animation:loadBar 1.5s ease forwards}
@keyframes loadBar{from{width:0}to{width:100%}}
@keyframes spin{0%{transform:scale(0) rotate(-30deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}

#toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:#1c1c1e;color:#fff;padding:12px 22px;border-radius:50px;
  font-size:14px;font-weight:700;z-index:9000;
  transition:transform .35s cubic-bezier(0.34,1.56,0.64,1);
  white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.25);
}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.success{background:var(--green)}
#toast.error{background:var(--red)}
#toast.info{background:var(--blue)}

.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);
  z-index:500;display:none;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-overlay.active{display:flex}
.modal-sheet{
  background:#fff;border-radius:24px 24px 0 0;
  width:100%;max-width:480px;padding:24px;
  animation:slideUp .3s ease;max-height:90vh;overflow-y:auto;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 20px}
.modal-title{font-size:20px;font-weight:900;margin-bottom:16px}

/* SPLASH */
#splash{
  background:linear-gradient(160deg,#1a0608 0%,#e23744 55%,#ff6b35 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;animation:fadeIn .6s ease;position:relative;overflow:hidden;
}
#splash::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.splash-logo{font-size:72px;margin-bottom:4px;animation:bounceIn .8s ease}
@keyframes bounceIn{0%{transform:scale(0)}70%{transform:scale(1.1)}100%{transform:scale(1)}}
.splash-brand{font-family:'Poppins',sans-serif;font-size:48px;font-weight:800;color:#fff;letter-spacing:-2px}
.splash-brand span{color:#ffe066}
.splash-tagline{color:rgba(255,255,255,0.8);font-size:16px;font-weight:600;text-align:center;max-width:260px;line-height:1.5}
.splash-features{display:flex;gap:20px;margin-top:10px}
.sf-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:rgba(255,255,255,0.85)}
.sf-icon{font-size:26px}
.sf-text{font-size:11px;font-weight:700}
.splash-btn{
  margin-top:20px;background:#fff;color:var(--red);
  border:none;padding:18px 60px;border-radius:50px;
  font-size:17px;font-weight:900;letter-spacing:.3px;
  box-shadow:0 8px 32px rgba(0,0,0,0.25);
  transition:transform .15s,box-shadow .15s;
}
.splash-btn:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(0,0,0,0.3)}
.splash-sub{color:rgba(255,255,255,0.55);font-size:12px;margin-top:10px}
.splash-area{
  background:rgba(255,255,255,0.1);border-radius:16px;
  padding:12px 20px;color:rgba(255,255,255,0.9);
  font-size:12px;font-weight:700;text-align:center;
  border:1px solid rgba(255,255,255,0.2);backdrop-filter:blur(4px);
}

/* AUTH */
#auth{
  background:linear-gradient(170deg,#fff8f8 0%,#fff 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;min-height:100vh;
}
.auth-logo{font-size:48px;margin-bottom:6px}
.auth-brand{font-family:'Poppins',sans-serif;font-size:30px;font-weight:800;color:var(--red)}
.auth-sub{color:var(--muted);font-size:14px;margin:6px 0 28px;text-align:center}
.auth-card{
  background:#fff;border-radius:24px;padding:28px;
  box-shadow:0 6px 48px rgba(0,0,0,0.12);width:100%;max-width:400px;
}
.auth-tabs{display:flex;border-radius:12px;overflow:hidden;border:1.5px solid var(--border);margin-bottom:22px}
.auth-tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:800;background:#fff;border:none;color:var(--muted);transition:all .2s}
.auth-tab.active{background:var(--red);color:#fff}
.field-group{margin-bottom:14px}
.field-group label{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
.field-group input{
  width:100%;padding:13px 16px;border:1.5px solid var(--border);
  border-radius:12px;font-size:15px;font-weight:600;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.field-group input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(226,55,68,0.1)}
.auth-submit{
  width:100%;padding:15px;background:var(--red);color:#fff;
  border:none;border-radius:14px;font-size:16px;font-weight:900;
  margin-top:8px;transition:background .2s,transform .1s;
  box-shadow:0 4px 20px rgba(226,55,68,0.4);
}
.auth-submit:hover{background:var(--red2);transform:translateY(-1px)}
.auth-err{color:var(--red);font-size:13px;margin-top:8px;text-align:center;min-height:18px;font-weight:700}
.auth-divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--muted);font-size:12px;font-weight:700}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.demo-btn{
  width:100%;padding:13px;border:2px solid var(--border);background:#fff;
  color:var(--text);border-radius:14px;font-size:14px;font-weight:800;
  transition:border-color .2s;
}
.demo-btn:hover{border-color:var(--red);color:var(--red)}

/* APP */
#app{padding-bottom:80px}

.navbar{
  position:sticky;top:0;z-index:100;
  background:#fff;padding:0 16px;
  box-shadow:0 2px 12px rgba(0,0,0,0.07);
}
.navbar-inner{display:flex;align-items:center;gap:10px;height:60px}
.nav-logo{font-family:'Poppins',sans-serif;font-size:22px;font-weight:800;color:var(--red);margin-right:4px;letter-spacing:-0.5px}
.nav-logo span{color:var(--orange)}
.nav-location{
  flex:1;display:flex;align-items:center;gap:6px;
  background:var(--bg);border-radius:10px;padding:8px 12px;
  cursor:pointer;overflow:hidden;border:1.5px solid transparent;
  transition:border-color .2s;
}
.nav-location:hover{border-color:var(--red)}
.nav-location .loc-pin{color:var(--red);font-size:16px}
.nav-location .loc-text{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.nav-location .loc-arrow{color:var(--muted);font-size:11px;margin-left:2px}
.nav-actions{display:flex;gap:6px;align-items:center}
.nav-icon-btn{
  background:none;border:none;font-size:22px;
  padding:4px 6px;border-radius:8px;position:relative;
  transition:background .15s;
}
.nav-icon-btn:hover{background:var(--bg)}
.cart-badge{
  position:absolute;top:-2px;right:-2px;
  background:var(--red);color:#fff;
  font-size:9px;font-weight:900;
  width:18px;height:18px;border-radius:50%;
  display:none;align-items:center;justify-content:center;
  border:2px solid #fff;
}
.cart-badge.show{display:flex}

.search-wrap{padding:14px 16px 6px}
.search-bar{
  display:flex;align-items:center;gap:10px;
  background:#fff;border:1.5px solid var(--border);
  border-radius:14px;padding:12px 16px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
  transition:border-color .2s,box-shadow .2s;
}
.search-bar:focus-within{border-color:var(--red);box-shadow:0 0 0 3px rgba(226,55,68,0.08)}
.search-bar input{
  flex:1;border:none;outline:none;font-size:15px;
  font-weight:600;background:transparent;color:var(--text);
}
.search-bar input::placeholder{color:#bbb;font-weight:500}
.search-bar .s-icon{font-size:18px;color:var(--muted)}
.search-bar .s-filter{
  background:var(--red);color:#fff;border:none;
  padding:6px 14px;border-radius:8px;font-size:13px;font-weight:800;
  transition:background .15s;
}
.search-bar .s-filter:hover{background:var(--red2)}
.search-results-drop{
  background:#fff;border-radius:14px;margin:0 16px;
  box-shadow:0 8px 24px rgba(0,0,0,0.12);overflow:hidden;
  display:none;border:1px solid var(--border);
}
.search-results-drop.show{display:block}
.sr-item{padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s}
.sr-item:hover{background:var(--bg)}
.sr-icon{font-size:22px}
.sr-info .sr-name{font-size:14px;font-weight:800}
.sr-info .sr-sub{font-size:12px;color:var(--muted);font-weight:600}

.filter-scroll{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none}
.filter-scroll::-webkit-scrollbar{display:none}
.filter-chip{
  flex-shrink:0;padding:7px 16px;border-radius:50px;
  border:1.5px solid var(--border);background:#fff;
  font-size:13px;font-weight:800;color:var(--muted);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.filter-chip.active,.filter-chip:hover{
  background:var(--red);color:#fff;border-color:var(--red);
}

.hero{
  margin:12px 16px;border-radius:22px;overflow:hidden;
  background:linear-gradient(120deg,#1a0608,#e23744);
  padding:24px 22px;position:relative;
  box-shadow:0 8px 28px rgba(226,55,68,0.3);
}
.hero::after{
  content:'🍕';position:absolute;right:20px;top:50%;transform:translateY(-50%);
  font-size:72px;opacity:.2;
}
.hero-greeting{color:rgba(255,255,255,0.75);font-size:13px;font-weight:700}
.hero-title{color:#fff;font-size:22px;font-weight:900;margin:4px 0 12px;line-height:1.3}
.hero-title span{color:#ffe066}
.hero-btn{
  background:#fff;color:var(--red);border:none;
  padding:10px 22px;border-radius:50px;font-size:13px;font-weight:900;
  box-shadow:0 4px 14px rgba(0,0,0,0.2);transition:transform .15s;
}
.hero-btn:hover{transform:scale(1.05)}

.sec-head{display:flex;align-items:center;justify-content:space-between;padding:20px 16px 10px}
.sec-title{font-size:18px;font-weight:900;letter-spacing:-.3px}
.sec-link{color:var(--red);font-size:13px;font-weight:800}

.cats-scroll{display:flex;gap:10px;padding:4px 16px 16px;overflow-x:auto;scrollbar-width:none}
.cats-scroll::-webkit-scrollbar{display:none}
.cat-chip{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  background:#fff;border-radius:16px;padding:14px 16px;
  box-shadow:0 2px 8px rgba(0,0,0,0.07);min-width:72px;
  border:2px solid transparent;transition:all .2s;cursor:pointer;flex-shrink:0;
}
.cat-chip:hover,.cat-chip.active{border-color:var(--red);box-shadow:0 4px 16px rgba(226,55,68,0.2);transform:translateY(-2px)}
.cat-chip .emoji{font-size:26px}
.cat-chip .label{font-size:11px;font-weight:800;color:var(--muted);white-space:nowrap}
.cat-chip.active .label{color:var(--red)}

/* RESTAURANT CARDS with image support */
.rest-grid{display:flex;flex-direction:column;gap:14px;padding:0 16px}
.rest-card{
  background:#fff;border-radius:20px;overflow:hidden;
  box-shadow:0 2px 14px rgba(0,0,0,0.08);
  transition:transform .2s,box-shadow .2s;cursor:pointer;
}
.rest-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.14)}
.rest-img{
  width:100%;height:170px;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.rest-img img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .4s ease;
}
.rest-card:hover .rest-img img{transform:scale(1.05)}
.rest-img-emoji{
  position:absolute;font-size:80px;z-index:1;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,0.3));
}
.rest-img-badge{
  position:absolute;top:10px;left:10px;z-index:2;
  background:rgba(0,0,0,0.65);color:#fff;
  font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;
  backdrop-filter:blur(6px);
}
.rest-offer{
  position:absolute;bottom:10px;left:10px;z-index:2;
  background:var(--green);color:#fff;
  font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;
}
.rest-fav{
  position:absolute;top:10px;right:10px;z-index:2;
  background:rgba(255,255,255,0.92);border:none;
  font-size:18px;width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s;box-shadow:0 2px 8px rgba(0,0,0,0.15);
}
.rest-fav:hover{transform:scale(1.2)}
.rest-fav.liked{animation:heartPop .3s ease}
@keyframes heartPop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.rest-body{padding:14px}
.rest-name{font-size:17px;font-weight:900;margin-bottom:4px}
.rest-meta{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted);margin-bottom:8px;flex-wrap:wrap}
.rest-rating{display:flex;align-items:center;gap:4px;background:#f0fff4;color:#27ae60;font-weight:800;padding:3px 8px;border-radius:8px;font-size:13px}
.rest-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{background:var(--bg);color:var(--muted);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.rest-closed-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,0.5);z-index:3;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:16px;font-weight:900;
}

.promo-scroll{display:flex;gap:12px;padding:0 16px 4px;overflow-x:auto;scrollbar-width:none}
.promo-scroll::-webkit-scrollbar{display:none}
.promo-card{
  flex-shrink:0;border-radius:18px;padding:18px;width:240px;
  display:flex;flex-direction:column;gap:6px;
  box-shadow:0 4px 16px rgba(0,0,0,0.12);position:relative;overflow:hidden;
}
.promo-card.p1{background:linear-gradient(120deg,#fc4a1a,#f7b733)}
.promo-card.p2{background:linear-gradient(120deg,#0575e6,#021b79)}
.promo-card.p3{background:linear-gradient(120deg,#134e5e,#71b280)}
.promo-card.p4{background:linear-gradient(120deg,#8e2de2,#4a00e0)}
.promo-card::after{content:'';position:absolute;right:-20px;bottom:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.1)}
.promo-top{font-size:24px}
.promo-title{color:#fff;font-size:15px;font-weight:900}
.promo-sub{color:rgba(255,255,255,0.85);font-size:12px;font-weight:600}
.promo-code{
  background:rgba(255,255,255,0.2);color:#fff;
  font-size:11px;font-weight:900;padding:5px 12px;border-radius:8px;
  width:fit-content;border:1.5px dashed rgba(255,255,255,0.6);
  margin-top:4px;cursor:pointer;transition:background .2s;
}
.promo-code:hover{background:rgba(255,255,255,0.3)}

.village-btn{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-radius:14px;border:2px solid var(--border);
  background:#fff;width:100%;margin-bottom:10px;font-size:15px;font-weight:700;
  transition:all .2s;
}
.village-btn:hover,.village-btn.selected{border-color:var(--red);background:#fff8f8;color:var(--red)}
.village-btn .v-check{font-size:18px;opacity:0;transition:opacity .2s}
.village-btn.selected .v-check{opacity:1}
.outside-area-msg{
  background:#fff8f8;border:2px solid var(--border);border-radius:14px;
  padding:16px;text-align:center;color:var(--muted);font-size:14px;font-weight:600;
  margin-top:10px;
}
.gps-btn{
  width:100%;padding:13px;background:linear-gradient(90deg,var(--blue),#0087ff);
  color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:800;
  margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px;
}
.or-divider{text-align:center;color:var(--muted);font-size:13px;font-weight:700;margin:8px 0 14px;position:relative}
.or-divider::before,.or-divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border)}
.or-divider::before{left:0}
.or-divider::after{right:0}

/* RESTAURANT DETAIL */
#restDetail{padding-bottom:100px}
.detail-hero{
  width:100%;height:220px;
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.detail-hero img{width:100%;height:100%;object-fit:cover}
.detail-hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.5) 100%);
}
.detail-hero-emoji{
  position:absolute;font-size:80px;z-index:2;
  filter:drop-shadow(0 4px 20px rgba(0,0,0,0.4));
}
.detail-back{
  position:absolute;top:16px;left:16px;z-index:3;
  background:rgba(255,255,255,0.92);border:none;
  width:40px;height:40px;border-radius:50%;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(0,0,0,0.2);
  backdrop-filter:blur(4px);transition:transform .15s;
}
.detail-back:hover{transform:scale(1.1)}
.detail-share{
  position:absolute;top:16px;right:16px;z-index:3;
  background:rgba(255,255,255,0.92);border:none;
  width:40px;height:40px;border-radius:50%;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(0,0,0,0.2);backdrop-filter:blur(4px);
}
.detail-info{background:#fff;padding:18px 16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.detail-name{font-size:24px;font-weight:900;margin-bottom:6px}
.detail-meta{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px}
.detail-stat{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--muted)}
.detail-stat .val{font-weight:800;color:var(--text)}
.green-chip{background:#f0fff4;color:#27ae60;font-weight:800;padding:2px 8px;border-radius:8px}
.detail-offer-strip{
  background:linear-gradient(90deg,#fff3cd,#fff8e1);
  border:1.5px solid #ffc107;border-radius:12px;
